# ManlyCam: Reference nginx reverse-proxy config
# This is a documentation reference for operators using nginx in front of the manlycam container.
#
# Assumptions:
#   1. The manlycam container is running and accessible at http://localhost:3000
#   2. You will add your own SSL/TLS configuration (Let's Encrypt, etc.)
#
# NOTE: WebSocket upgrade headers are CRITICAL for the /ws path to function.

server {
    listen 80;
    server_name cam.example.com; # Replace with your domain

    # Increase max body size if needed for large profile pictures (though ManlyCam uses Gravatar/URL)
    client_max_body_size 10M;

    location / {
        proxy_pass http://localhost:3000;
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Crucial for /ws and real-time state)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts for WebSockets and long-running requests
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
