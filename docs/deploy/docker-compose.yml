# apps/server/deploy/docker-compose.yml
# Simple deployment: Hono server + mediamtx + PostgreSQL
# TLS is handled externally (host-level Caddy/nginx) or by Traefik variant.
# See traefik/ subdirectory for a fully Docker-native TLS option.
#
# Usage:
#   1. cp apps/server/.env.example .env
#   2. Edit .env with your values (POSTGRES_PASSWORD, BASE_URL, Google OAuth credentials, etc.)
#   3. Edit frps.toml and set [auth] token to a secure random secret
#      (must match auth.token in /etc/manlycam/frpc.toml on the Pi)
#   4. Copy mediamtx-server.yml to the deploy directory and substitute FRP_HOST/FRP_RTSP_PORT
#   5. docker compose --env-file .env up -d

services:
  server:
    # Image published to GHCR by CI — replace owner with your GitHub username/org
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-zikeji}/manlycam:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # HTTP server port (must match the exposed port above)
      PORT: "3000"
      # Public base URL — e.g. https://cam.example.com (used for OAuth redirects)
      BASE_URL: "${BASE_URL}"
      # PostgreSQL connection string — references the postgres service below
      DATABASE_URL: "postgresql://manlycam:${POSTGRES_PASSWORD}@postgres:5432/manlycam"
      # Secret used to sign sessions (min 32 chars)
      SESSION_SECRET: "${SESSION_SECRET}"
      # Google OAuth 2.0 credentials
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
      # frp host and remote ports — server connects to frps on the Docker-internal network
      # FRP_HOST is the Docker service name for frps; server reaches it via Docker bridge DNS
      FRP_HOST: frps
      FRP_RTSP_PORT: "${FRP_RTSP_PORT:-11935}"
      FRP_API_PORT: "${FRP_API_PORT:-11936}"
      # mediamtx base URLs — server reaches mediamtx over Docker bridge DNS
      # WebRTC (8888) and API (9997) are internal-only; Hono proxies WHEP signaling
      MTX_API_URL: "http://mediamtx:9997"
      MTX_WEBRTC_URL: "http://mediamtx:8888"
      # Configurable instance identity (FR55)
      PET_NAME: "${PET_NAME:-Manly}"
      SITE_NAME: "${SITE_NAME:-ManlyCam}"
    depends_on:
      postgres:
        condition: service_healthy
      mediamtx:
        condition: service_started

  mediamtx:
    image: bluenviron/mediamtx:latest
    restart: unless-stopped
    ports:
      - "8554:8554"     # RTSP — frpc on Pi pushes stream here via frps tunnel
      - "8189:8189/udp" # WebRTC ICE/STUN — browsers negotiate media transport over UDP
      # 8888 (WebRTC WHEP signaling) and 9997 (API) are internal-only — server reaches via Docker bridge
    volumes:
      # Copy mediamtx-server.yml alongside this compose file and substitute FRP_HOST/FRP_RTSP_PORT
      - ./mediamtx-server.yml:/mediamtx.yml:ro

  frps:
    image: snowdreamtech/frps:latest
    restart: unless-stopped
    ports:
      - "7000:7000"    # frpc client connections — Pi connects here to establish tunnels
      # 11935 and 11936 are not published — the server container reaches frps directly
      # over the Docker network using the service name (frps:11935, frps:11936)
    volumes:
      # frps.toml must be present alongside this compose file — copy and fill in the token
      - ./frps.toml:/etc/frp/frps.toml:ro

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: manlycam
      POSTGRES_USER: manlycam
      # Set POSTGRES_PASSWORD in your .env file — never hardcode this value
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manlycam"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  # Named volume for PostgreSQL data — persists across container restarts
  pgdata:
