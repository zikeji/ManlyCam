# apps/server/deploy/traefik/frps.toml
# frp server (frps) configuration — frp v0.5x+ TOML format
# Mount this file into the frps container (see docker-compose.yml in this directory)
#
# Fill in the token to match auth.token in /etc/manlycam/frpc.toml on the Pi

# Port frpc clients (Pi) connect to for tunnel establishment
bindPort = 7000

[auth]
method = "token"
# Must match auth.token in /etc/manlycam/frpc.toml on the Pi
token = "change-me-to-a-random-secret"
