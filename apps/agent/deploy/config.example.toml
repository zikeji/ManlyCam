# ManlyCam Agent Configuration
# Copy this file to config.toml and fill in your values.
# Format: TOML (https://toml.io)
#
# Field names here are authoritative — the Go config struct matches exactly these names.

[stream]
# Output frame width in pixels
width = 2328

# Output frame height in pixels
height = 1748

# Target frame rate (fps)
framerate = 30

# Horizontally flip the camera image (true/false)
hflip = true

# Vertically flip the camera image (true/false)
vflip = true

# Optional: path to a libcamera tuning file for the specific camera sensor.
# Required for sensors not auto-detected by libcamera (e.g. Arducam IMX519).
# If omitted, mediamtx uses the default libcamera tuning for the detected sensor.
# tuning_file = "/usr/share/libcamera/ipa/rpi/vc4/imx519.json"

# Local TCP port mediamtx listens on for RTSP connections.
# The frp stream tunnel forwards this port to the server.
# RTSP stream available at: rtsp://localhost:{rtsp_port}/cam
rtsp_port = 8554

# Local port mediamtx binds its HTTP API on (loopback only).
# The frp api tunnel exposes this port to the server for Story 3.6 camera controls.
# Must match frp.api.local_port below.
api_port = 9997

[frp]
# Hostname or IP address of the ManlyCam server running frps
server_addr = "upstream.example.com"

# Port frps is listening on for client connections
server_port = 7000

# Authentication token — must match the auth_token set in frps config on the server
# Note: field name is auth_token (NOT token)
auth_token = "change-me-to-a-random-secret"

[frp.stream]
# Remote port frps exposes for RTSP stream ingestion; ffmpeg on the server connects here
remote_port = 11935

[frp.api]
# Local port to tunnel — must match stream.api_port above (mediamtx HTTP API).
# The server proxies camera control commands (Story 3.6) through this tunnel.
local_port = 9997

# Remote port frps exposes for the API proxy; the Hono server connects here
remote_port = 11936

[update]
# GitHub Releases API URL for update checks
# The agent fetches this URL to discover the latest release asset download URL
update_url = "https://api.github.com/repos/zikeji/ManlyCam/releases/latest"
