# apps/server/deploy/nginx.conf
# nginx reverse proxy for ManlyCam
# Assumes TLS certs managed externally (e.g. certbot/Let's Encrypt)
#
# Prerequisites:
#   - nginx installed on the host
#   - TLS certificate and key obtained (e.g. via: certbot certonly --nginx -d cam.example.com)
#   - apps/web/dist/ built and placed at /opt/manlycam/web/dist
#   - Hono server running on localhost:3000 (via docker-compose.yml or systemd)
#
# Usage:
#   1. Replace cam.example.com with your domain
#   2. Replace cert/key paths with actual certbot output paths
#   3. sudo cp nginx.conf /etc/nginx/sites-available/manlycam
#   4. sudo ln -s /etc/nginx/sites-available/manlycam /etc/nginx/sites-enabled/
#   5. sudo nginx -t && sudo systemctl reload nginx

# Redirect all HTTP traffic to HTTPS
# Note: Replace cam.example.com with your actual domain or use $host for dynamic
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;
    # Replace with your actual domain, or leave as _ to match all requests

    # TLS configuration — replace paths with your actual certificate locations
    # (e.g. /etc/letsencrypt/live/cam.example.com/fullchain.pem)
    ssl_certificate     /etc/ssl/certs/manlycam.pem;
    ssl_certificate_key /etc/ssl/private/manlycam.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Static SPA — serve Vue dist directory
    root /opt/manlycam/web/dist;
    index index.html;

    # API proxy to Hono server
    location /api/ {
        proxy_pass         http://localhost:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # WebSocket proxy
    # CRITICAL: These Upgrade headers are mandatory — omitting them causes HTTP 400/502
    # on WebSocket upgrade. This is the most common nginx WebSocket misconfiguration.
    location /ws {
        proxy_pass             http://localhost:3000;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_read_timeout     3600s;     # keep long-lived WS connections alive
    }

    # SPA catch-all — must come last; serves index.html for all unmatched paths
    # This enables client-side routing (Vue Router history mode)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
