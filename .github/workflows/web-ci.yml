name: Web CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/types/**'
      - '.github/workflows/web-ci.yml'

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @manlycam/server exec prisma generate
      - run: pnpm --filter @manlycam/web lint
      - run: pnpm --filter @manlycam/web typecheck
      - run: pnpm --filter @manlycam/web exec vitest run --coverage
      - run: pnpm --filter @manlycam/web build
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/manlycam-web:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/manlycam-web:latest
