name: CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/server/**'
      - 'apps/web/**'
      - 'packages/types/**'
      - '.github/workflows/server-ci.yml'

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @manlycam/server exec prisma generate

      # Web CI steps
      - run: pnpm --filter @manlycam/web lint
      - run: pnpm --filter @manlycam/web typecheck
      - run: pnpm --filter @manlycam/web exec vitest run --coverage
      - name: Report web coverage
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: apps/web/coverage/coverage-summary.json
          json-final-path: apps/web/coverage/coverage-final.json
          vite-config-path: apps/web/vite.config.ts
      - run: pnpm --filter @manlycam/web build

      # Server CI steps
      - run: pnpm --filter @manlycam/server lint
      - run: pnpm --filter @manlycam/server typecheck
      - run: pnpm --filter @manlycam/server exec vitest run --coverage
      - name: Report server coverage
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: apps/server/coverage/coverage-summary.json
          json-final-path: apps/server/coverage/coverage-final.json
          vite-config-path: apps/server/vitest.config.ts

      - name: Extract coverage
        id: extract_coverage
        run: |
          WEB_COVERAGE=$(jq '.total.lines.pct' apps/web/coverage/coverage-summary.json)
          SERVER_COVERAGE=$(jq '.total.lines.pct' apps/server/coverage/coverage-summary.json)
          TOTAL_COVERAGE=$(echo "($WEB_COVERAGE + $SERVER_COVERAGE) / 2" | bc -l | xargs printf "%.2f")
          echo "total_coverage=$TOTAL_COVERAGE" >> $GITHUB_OUTPUT

          # Color logic based on coverage percentage
          if (( $(echo "$TOTAL_COVERAGE >= 90" | bc -l) )); then COLOR="brightgreen";
          elif (( $(echo "$TOTAL_COVERAGE >= 80" | bc -l) )); then COLOR="green";
          elif (( $(echo "$TOTAL_COVERAGE >= 70" | bc -l) )); then COLOR="yellowgreen";
          elif (( $(echo "$TOTAL_COVERAGE >= 60" | bc -l) )); then COLOR="yellow";
          elif (( $(echo "$TOTAL_COVERAGE >= 50" | bc -l) )); then COLOR="orange";
          else COLOR="red"; fi
          echo "color=$COLOR" >> $GITHUB_OUTPUT

      - name: Update Coverage Badge
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ secrets.GIST_ID }}
          filename: coverage.json
          label: coverage
          message: ${{ steps.extract_coverage.outputs.total_coverage }}%
          color: ${{ steps.extract_coverage.outputs.color }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push monolithic image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/manlycam:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/manlycam:latest
