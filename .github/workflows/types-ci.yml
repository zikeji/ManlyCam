name: Types CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/types/**'
  pull_request:
    paths:
      - 'packages/types/**'

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @manlycam/types typecheck
