name: Agent CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/agent/**'
      - '.github/workflows/agent-ci.yml'
    tags:
      - 'v*.*.*'
  pull_request:
    paths:
      - 'apps/agent/**'
      - '.github/workflows/agent-ci.yml'

jobs:
  test:
    if: "!startsWith(github.ref, 'refs/tags/')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      checks: write
      pull-requests: write
    defaults:
      run:
        working-directory: apps/agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'apps/agent/go.mod'
      - run: go vet ./...
      - uses: gwatts/go-coverage-action@v2
        with:
          coverage-threshold: 38
          cover-pkg: github.com/zikeji/ManlyCam/apps/agent/internal/camera,github.com/zikeji/ManlyCam/apps/agent/internal/config,github.com/zikeji/ManlyCam/apps/agent/internal/tunnel
          working-directory: apps/agent
      - name: Cross-compile ARM check
        run: GOOS=linux GOARCH=arm GOARM=7 go build -o /dev/null ./...

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: apps/agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'apps/agent/go.mod'
      - name: Cross-compile for ARM
        run: GOOS=linux GOARCH=arm GOARM=7 go build -o manlycam-agent ./...
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/agent/manlycam-agent
