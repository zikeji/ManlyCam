# Agent Customization
# Customize any section below - all are optional

# Override agent name
agent:
  metadata:
    name: ""

# Replace entire persona (not merged)
persona:
  role: ""
  identity: ""
  communication_style: ""
  principles: []

# Add custom critical actions (appended after standard config loading)
critical_actions:
  - "Load {project-root}/_bmad/_memory/github-issues.md to stay aware of the issue map and integration protocol."

# Add persistent memories for the agent
memories:
  - "Every git commit MUST include the trailer: Co-authored-by: GitHub Copilot <copilot@github.com>"
  - "When a new story is created outside the original 30, a matching GitHub Issue should be created in zikeji/ManlyCam and added to github-issues.md before sprint planning proceeds."
  - "PRs close GitHub Issues automatically via 'Closes #N' — do not ask the dev agent to manually update issue state."
# Example:
# memories:
#   - "User prefers detailed technical explanations"
#   - "Current project uses React and TypeScript"

# Add custom menu items (appended to base menu)
# Don't include * prefix or help/exit - auto-injected
menu: []
# Example:
# menu:
#   - trigger: my-workflow
#     workflow: "{project-root}/custom/my.yaml"
#     description: My custom workflow

# Add custom prompts (for action="#id" handlers)
prompts: []
# Example:
# prompts:
# - id: my-prompt
#   content: |
#     Prompt instructions here
