# Agent Customization
# Customize any section below - all are optional

# Override agent name
agent:
  metadata:
    name: ""

# Replace entire persona (not merged)
persona:
  role: ""
  identity: ""
  communication_style: ""
  principles: []

# Add custom critical actions (appended after standard config loading)
critical_actions:
  - "Load {project-root}/_bmad/_memory/github-issues.md and store the story→issue map and protocol as session context before implementing any story."

# Add persistent memories for the agent
memories:
  - "Every git commit MUST include the trailer: Co-authored-by: GitHub Copilot <copilot@github.com>"
  - "Every PR description MUST include 'Closes #N' where N is the GitHub Issue number for the story being implemented. Check {project-root}/_bmad/_memory/github-issues.md for the story→issue map."
  - "Do NOT manually manage GitHub Issue state — issues close automatically via PR merge. Story files remain the authoritative source of truth."
# Example:
# memories:
#   - "User prefers detailed technical explanations"
#   - "Current project uses React and TypeScript"

# Add custom menu items (appended to base menu)
# Don't include * prefix or help/exit - auto-injected
menu: []
# Example:
# menu:
#   - trigger: my-workflow
#     workflow: "{project-root}/custom/my.yaml"
#     description: My custom workflow

# Add custom prompts (for action="#id" handlers)
prompts: []
# Example:
# prompts:
# - id: my-prompt
#   content: |
#     Prompt instructions here
